<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Search and Filter Section */
        .search-filter-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #5568d3;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .filter-group select,
        .filter-group input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            transition: border-color 0.3s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .chart-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        /* Movies Section */
        .movies-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .movies-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            color: white;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .movie-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9em;
            opacity: 0.9;
        }

        .movie-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .rating-badge {
            background: rgba(255, 255, 255, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .movie-info {
            font-size: 0.85em;
            opacity: 0.85;
            line-height: 1.6;
        }

        .movie-info p {
            margin: 5px 0;
        }

        .movie-genre {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.8em;
            display: inline-block;
        }

        /* Loading and Empty States */
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 2em;
            }

            .search-box {
                flex-direction: column;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .movies-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }

        .top-movies-list {
            list-style: none;
        }

        .top-movies-list li {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-movies-list li:last-child {
            border-bottom: none;
        }

        .movie-rank {
            font-weight: bold;
            color: #667eea;
            margin-right: 10px;
        }

        .movie-name {
            flex: 1;
        }

        .movie-rating-value {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Movie Rating Dashboard</h1>
            <p class="subtitle">Explore, Filter, and Discover Amazing Movies</p>
        </header>

        <!-- Search and Filter Section -->
        <div class="search-filter-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search movies by name...">
                <button onclick="searchMovies()">Search</button>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label for="minRating">Min Rating</label>
                    <input type="number" id="minRating" min="0" max="10" step="0.1" value="0" placeholder="0.0">
                </div>
                <div class="filter-group">
                    <label for="yearFilter">Year</label>
                    <input type="number" id="yearFilter" min="1900" max="2099" placeholder="Any year">
                </div>
                <div class="filter-group">
                    <label for="industryFilter">Industry</label>
                    <select id="industryFilter">
                        <option value="">All Industries</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="genreFilter">Genre</label>
                    <select id="genreFilter">
                        <option value="">All Genres</option>
                    </select>
                </div>
                <div class="filter-group" style="justify-content: flex-end;">
                    <button onclick="applyFilters()" style="background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">Apply Filters</button>
                </div>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- Charts Section -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">Rating Distribution</div>
                <canvas id="ratingChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">Top Industries</div>
                <canvas id="industriesChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">Top Genres</div>
                <canvas id="genresChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">Top Rated Movies</div>
                <ul class="top-movies-list" id="topMoviesList"></ul>
            </div>
        </div>

        <!-- Movies Grid -->
        <div class="movies-section">
            <h2 class="movies-title">All Movies</h2>
            <div id="moviesContainer" class="movies-grid"></div>
        </div>
    </div>

    <script>
        let allMovies = [];
        let charts = {};

        // Initialize dashboard
        async function init() {
            await loadStats();
            await loadMovies();
            await loadFilters();
        }

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();

                // Create stat cards
                const statsGrid = document.getElementById('statsGrid');
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">Total Movies</div>
                        <div class="stat-value">${stats.total_movies}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Average Rating</div>
                        <div class="stat-value">${stats.avg_rating.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Avg Reviews</div>
                        <div class="stat-value">${stats.avg_reviews.toLocaleString()}</div>
                    </div>
                `;

                // Create charts
                createCharts(stats);
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Create charts
        function createCharts(stats) {
            // Rating Distribution Chart
            const ratingCtx = document.getElementById('ratingChart').getContext('2d');
            if (charts.rating) charts.rating.destroy();
            charts.rating = new Chart(ratingCtx, {
                type: 'bar',
                data: {
                    labels: stats.rating_distribution.map(d => d.range),
                    datasets: [{
                        label: 'Number of Movies',
                        data: stats.rating_distribution.map(d => d.count),
                        backgroundColor: [
                            '#667eea',
                            '#764ba2',
                            '#f093fb',
                            '#4facfe',
                            '#00f2fe'
                        ],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });

            // Top Industries Chart
            const industriesCtx = document.getElementById('industriesChart').getContext('2d');
            if (charts.industries) charts.industries.destroy();
            charts.industries = new Chart(industriesCtx, {
                type: 'doughnut',
                data: {
                    labels: stats.top_industries.map(i => i.industry),
                    datasets: [{
                        data: stats.top_industries.map(i => i.count),
                        backgroundColor: [
                            '#667eea',
                            '#764ba2',
                            '#f093fb',
                            '#4facfe',
                            '#00f2fe',
                            '#43e97b',
                            '#fa709a'
                        ],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // Top Genres Chart
            const genresCtx = document.getElementById('genresChart').getContext('2d');
            if (charts.genres) charts.genres.destroy();
            charts.genres = new Chart(genresCtx, {
                type: 'bar',
                data: {
                    labels: stats.top_genres.slice(0, 8).map(g => g.genre.substring(0, 15) + '...'),
                    datasets: [{
                        label: 'Avg Rating',
                        data: stats.top_genres.slice(0, 8).map(g => g.avg_rating),
                        backgroundColor: '#667eea',
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            max: 10
                        }
                    }
                }
            });

            // Top Movies List
            const topMoviesList = document.getElementById('topMoviesList');
            topMoviesList.innerHTML = stats.top_movies.map((m, i) => `
                <li>
                    <span class="movie-rank">#${i + 1}</span>
                    <span class="movie-name">${m.name} (${m.year})</span>
                    <span class="movie-rating-value">⭐ ${m.rating}</span>
                </li>
            `).join('');
        }

        // Load all movies
        async function loadMovies() {
            try {
                const response = await fetch('/api/movies');
                allMovies = await response.json();
                displayMovies(allMovies);
            } catch (error) {
                console.error('Error loading movies:', error);
            }
        }

        // Display movies
        function displayMovies(movies) {
            const container = document.getElementById('moviesContainer');
            
            if (movies.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No movies found. Try adjusting your filters.</p></div>';
                return;
            }

            container.innerHTML = movies.map(movie => `
                <div class="movie-card">
                    <div class="movie-title">${movie.name}</div>
                    <div class="movie-meta">
                        <span>📅 ${movie.year}</span>
                        <span>🎬 ${movie.industry}</span>
                    </div>
                    <div class="movie-rating">
                        <span class="rating-badge">⭐ ${movie.rating}</span>
                    </div>
                    <div class="movie-info">
                        <p><strong>Director:</strong> ${movie.director}</p>
                        <p><strong>Ratings:</strong> ${(movie.rated_by || 0).toLocaleString()} users</p>
                        <p><strong>Reviews:</strong> ${(movie.user_reviews || 0).toLocaleString()}</p>
                        ${movie.genre ? `<span class="movie-genre">${movie.genre}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Search movies
        async function searchMovies() {
            const query = document.getElementById('searchInput').value;
            if (!query) {
                loadMovies();
                return;
            }

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const movies = await response.json();
                displayMovies(movies);
            } catch (error) {
                console.error('Error searching:', error);
            }
        }

        // Load filter options
        async function loadFilters() {
            try {
                const [industriesRes, genresRes] = await Promise.all([
                    fetch('/api/industries'),
                    fetch('/api/genres')
                ]);

                const industries = await industriesRes.json();
                const genres = await genresRes.json();

                const industryFilter = document.getElementById('industryFilter');
                industries.forEach(industry => {
                    const option = document.createElement('option');
                    option.value = industry;
                    option.textContent = industry;
                    industryFilter.appendChild(option);
                });

                const genreFilter = document.getElementById('genreFilter');
                genres.forEach(genre => {
                    const option = document.createElement('option');
                    option.value = genre;
                    option.textContent = genre;
                    genreFilter.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading filters:', error);
            }
        }

        // Apply filters
        async function applyFilters() {
            const minRating = parseFloat(document.getElementById('minRating').value) || 0;
            const year = document.getElementById('yearFilter').value ? parseInt(document.getElementById('yearFilter').value) : null;
            const industry = document.getElementById('industryFilter').value;
            const genre = document.getElementById('genreFilter').value;

            try {
                let url = `/api/filter?min_rating=${minRating}`;
                if (year) url += `&year=${year}`;
                if (industry) url += `&industry=${encodeURIComponent(industry)}`;
                if (genre) url += `&genre=${encodeURIComponent(genre)}`;

                const response = await fetch(url);
                const movies = await response.json();
                displayMovies(movies);
            } catch (error) {
                console.error('Error applying filters:', error);
            }
        }

        // Allow Enter key in search
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchMovies();
            });

            init();
        });
    </script>
</body>
</html>
